<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#10b981" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Esila Ticari">
    <link rel="apple-touch-icon" href="/icon-192.svg">
    <link rel="apple-touch-startup-image" href="/icon-512.svg">
    
    <title>Esila Ticari - Ticaretin Bulut Hali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              emerald: {
                50: '#ecfdf5',
                100: '#d1fae5',
                200: '#a7f3d0',
                300: '#6ee7b7',
                400: '#34d399',
                500: '#10b981',
                600: '#059669',
                700: '#047857',
                800: '#065f46',
                900: '#064e3b',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              logo: ['"Great Vibes"', 'cursive'], // Approximating the aesthetic script style
            }
          }
        }
      }
    </script>
    <style>
      html {
        font-size: 11px;
      }
      
      @media print {
        body * { visibility: hidden; }
        body, html, #root, div, main, section { overflow: visible !important; height: auto !important; max-height: none !important; }
        .print-only, .print-only *, .print-target, .print-target * { visibility: visible; }
        .print-only, .print-target {
           position: absolute;
           left: 0;
           top: 0;
           width: 100%;
           display: block !important;
        }
        .no-print { display: none !important; }
        body { background: white; }
      }
      .print-only { display: none; }
      
      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #10b981;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #059669;
      }

      /* HTML5 QRCode Custom Styling */
      #barcode-reader {
        border: none !important;
      }
      #barcode-reader button {
        background-color: #059669;
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        border: none;
        font-weight: 500;
        cursor: pointer;
        margin: 5px;
      }
      #barcode-reader button:hover {
        background-color: #047857;
      }
      #barcode-reader select {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        margin-bottom: 10px;
        width: 100%;
        max-width: 300px;
        color: #333;
      }
      #barcode-reader__dashboard_section_csr span {
        display: none !important; /* Hide "or" text */
      }
      #barcode-reader__dashboard_section_swaplink {
        display: none !important; /* Hide "scan an image file" text */
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50 text-gray-800 antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {
          console.log('SW registered:', reg.scope);
        }).catch((err) => {
          console.log('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
